spring.application.name=runpack-api
server.port=8080

# DataSource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/runpack}
spring.datasource.username=${DB_USER:runpack}
spring.datasource.password=${DB_PASS:runpack}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
runpack.jwt.secret=${JWT_SECRET:changeme-replace-in-production-32chars}
runpack.jwt.expiration-ms=604800000

# Google OIDC
runpack.oauth.google.jwks-uri=https://www.googleapis.com/oauth2/v3/certs
runpack.oauth.google.issuer=https://accounts.google.com
runpack.oauth.skip-verification=${SKIP_OIDC_VERIFICATION:false}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# WebSocket
# Native mobile clients (React Native) send no/non-http Origin, so restrictive
# patterns reject the handshake (403). Auth is enforced at the STOMP CONNECT frame (JWT).
runpack.ws.allowed-origins=${WS_ALLOWED_ORIGINS:*}

# RevenueCat
revenuecat.webhook-secret=${REVENUECAT_WEBHOOK_SECRET:Bearer dev-secret-change-me}
